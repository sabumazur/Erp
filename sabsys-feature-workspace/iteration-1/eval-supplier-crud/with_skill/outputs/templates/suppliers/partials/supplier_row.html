{% load i18n humanize %}
<tr>
  <td>
    <a href="{% url 'suppliers:supplier_detail' row.pk %}" class="text-decoration-none fw-semibold">
      {{ row.name }}
    </a>
  </td>
  <td>{{ row.rnc|default:"—" }}</td>
  <td>{{ row.phone|default:"—" }}</td>
  <td>
    {% if row.email %}
      <a href="mailto:{{ row.email }}" class="text-decoration-none">{{ row.email }}</a>
    {% else %}
      —
    {% endif %}
  </td>
  <td>
    {% if row.status == "ACTIVE" %}
      <span class="badge bg-success">{{ row.get_status_display }}</span>
    {% else %}
      <span class="badge bg-secondary">{{ row.get_status_display }}</span>
    {% endif %}
  </td>
  <td>{{ row.created_at|naturaltime }}</td>
  <td class="text-end">
    <button class="btn btn-sm btn-outline-secondary"
            hx-get="{% url 'suppliers:supplier_edit' row.pk %}"
            hx-target="#supplier-modal-body"
            hx-swap="innerHTML"
            data-bs-toggle="modal"
            data-bs-target="#supplier-modal"
            title="{% trans 'Editar' %}">
      <i class="bi bi-pencil"></i>
    </button>
    <button class="btn btn-sm btn-outline-danger"
            hx-post="{% url 'suppliers:supplier_delete' row.pk %}"
            hx-confirm="{% trans '¿Eliminar este proveedor? Esta acción no se puede deshacer.' %}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            title="{% trans 'Eliminar' %}">
      <i class="bi bi-trash"></i>
    </button>
  </td>
</tr>
