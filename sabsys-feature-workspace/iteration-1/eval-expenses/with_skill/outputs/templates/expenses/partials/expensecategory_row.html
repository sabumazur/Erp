{% load i18n %}
<tr>

  <td data-col="name" class="fw-semibold" style="font-size:.85rem;color:#1e2130">
    {{ row.name }}
  </td>

  <td class="text-end" style="white-space:nowrap">
    {# Edit #}
    <button type="button" class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'expenses:category_edit' row.pk %}"
            hx-target="#expensecategory-modal-body"
            hx-on::after-request="
              document.getElementById('expensecategoryModalLabel').textContent = '{% trans "Editar categoría" %}';
              bootstrap.Modal.getOrCreateInstance('#expensecategoryModal').show();">
      <i class="bi bi-pencil"></i>
    </button>

    {# Delete #}
    <button type="button" class="btn btn-outline-danger btn-sm"
            onclick="Swal.fire({
              icon: 'warning',
              title: '{% trans "¿Eliminar categoría?" %}',
              html: '<strong>{{ row.name|escapejs }}</strong>',
              showCancelButton: true,
              confirmButtonText: '{% trans "Eliminar" %}',
              cancelButtonText: '{% trans "Cancelar" %}',
              confirmButtonColor: '#dc3545',
            }).then(r => {
              if (r.isConfirmed)
                htmx.ajax('POST', '{% url "expenses:category_delete" row.pk %}',
                  { target: '#dt-results', swap: 'innerHTML',
                    values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
            })">
      <i class="bi bi-trash"></i>
    </button>
  </td>

</tr>
