{% extends "base.html" %}
{% load i18n crispy_forms_tags %}

{% block title %}{% trans "Categoría de gasto" %}{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  {% include "components/breadcrumbs.html" %}

  <div class="card border-0 shadow-sm" style="max-width:500px">
    <div class="card-body">
      <h5 class="card-title mb-3">{% trans "Editar categoría" %}</h5>
      <form method="post">
        {% csrf_token %}
        {% crispy form %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary">{% trans "Guardar" %}</button>
          <a href="{% url 'expenses:category_list' %}" class="btn btn-secondary">{% trans "Cancelar" %}</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
