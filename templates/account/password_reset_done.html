{% extends "base.html" %}

{% block title %}Check your email — SabSys{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <i class="bi bi-envelope-check display-3 text-success"></i>
    <h4 class="mt-3">Check your inbox</h4>
    <p class="text-muted">If an account exists for that email, a reset link is on its way.</p>
    <a href="{% url 'account_login' %}" class="btn btn-outline-secondary mt-2">Back to sign in</a>
  </div>
</div>
{% endblock %}
