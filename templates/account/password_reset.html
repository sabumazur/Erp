{% extends "base_anon.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset password — SabSys{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-5">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1">Reset your password</h4>
        <p class="text-muted small mb-4">We'll send a reset link to your email.</p>

        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </div>
        </form>

        <hr>
        <p class="text-center mb-0 small">
          <a href="{% url 'account_login' %}">Back to sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
