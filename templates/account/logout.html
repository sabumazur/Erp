{% extends "base_anon.html" %}

{% block title %}Cerrar sesión{% endblock %}

{% block content %}
<div class="auth-card text-center">
  <div class="auth-status-icon is-muted">
    <i class="bi bi-door-open"></i>
  </div>
  <span class="auth-eyebrow">Hasta pronto</span>
  <h1 class="auth-card-title">¿Cerrar sesión?</h1>
  <p class="auth-card-sub">¿Confirmas que deseas salir de SabSys?</p>
  <div class="d-grid gap-2">
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="auth-btn auth-btn-primary w-100">
        <i class="bi bi-box-arrow-right"></i> Sí, cerrar sesión
      </button>
    </form>
    <a href="{% url 'accounts:dashboard' %}" class="auth-btn auth-btn-secondary">
      Cancelar
    </a>
  </div>
</div>
{% endblock %}
