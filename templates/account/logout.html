{% extends "base.html" %}

{% block title %}Sign out — SabSys{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 text-center">
    <i class="bi bi-door-open display-3 text-muted"></i>
    <h4 class="mt-3">Sign out of SabSys?</h4>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger mt-2">
        <i class="bi bi-box-arrow-right me-1"></i> Yes, sign me out
      </button>
      <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary mt-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
