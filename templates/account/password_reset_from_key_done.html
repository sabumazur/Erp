{% extends "base_anon.html" %}

{% block title %}Contraseña actualizada{% endblock %}

{% block content %}
<div class="auth-card text-center">
  <div class="auth-status-icon is-success">
    <i class="bi bi-shield-check"></i>
  </div>
  <span class="auth-eyebrow">Listo</span>
  <h1 class="auth-card-title">Contraseña actualizada</h1>
  <p class="auth-card-sub">
    Tu contraseña ha sido cambiada. Ya puedes ingresar con tu nueva contraseña.
  </p>
  <a href="{% url 'account_login' %}" class="auth-btn auth-btn-primary">
    <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
  </a>
</div>
{% endblock %}
