{% load i18n humanize %}

<style>
  .history-timeline::before {
    content: "";
    position: absolute;
    left: 19px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e9ecef;
  }
  .history-record {
    padding: 14px 14px 14px 52px;
    border-bottom: 1px solid #f0f2f5;
  }
  .history-record:last-child {
    border-bottom: none;
  }
  .history-dot {
    position: absolute;
    left: 10px;
    top: 18px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 2px #e9ecef;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
</style>

{% if history_records %}
<div class="card mt-4" x-data="{ open: false }">
  <div class="card-header d-flex align-items-center justify-content-between py-2"
       style="cursor: pointer;" @click="open = !open">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-clock-history"></i>
      <strong>{% trans "Historial de cambios" %}</strong>
      <span class="badge bg-secondary rounded-pill">{{ history_records|length }}</span>
    </div>
    <i :class="open ? 'bi bi-chevron-up' : 'bi bi-chevron-down'" class="text-muted"></i>
  </div>
  <div class="card-body p-0" x-show="open" x-cloak>
    <div class="history-timeline position-relative">
      {% include "components/history/timeline.html" with records=history_records %}
    </div>
  </div>
</div>
{% else %}
<div class="card mt-4">
  <div class="card-header d-flex align-items-center gap-2">
    <i class="bi bi-clock-history"></i>
    <strong>{% trans "Historial de cambios" %}</strong>
  </div>
  <div class="card-body">
    <p class="text-muted fst-italic py-3 text-center mb-0">{% trans "Sin historial registrado." %}</p>
  </div>
</div>
{% endif %}
