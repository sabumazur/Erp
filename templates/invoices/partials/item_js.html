{# Shared Alpine.js / vanilla JS for the invoice item formset #}
<script>
// ── Per-row Alpine component ──────────────────────────────────────────────────
function itemRow() {
  return {
    qty:   1,
    price: 0,
    rate:  'RATE_18',
    rateMap: { EXEMPT: 0, RATE_0: 0, RATE_16: 0.16, RATE_18: 0.18 },

    init() {
      const row = this.$el;
      const qEl = row.querySelector('[name$="-quantity"]');
      const pEl = row.querySelector('[name$="-unit_price"]');
      const rEl = row.querySelector('[name$="-itbis_rate"]');
      if (qEl) this.qty   = parseInt(qEl.value, 10) || 1;
      if (pEl) this.price = parseFloat(pEl.value) || 0;
      if (rEl) this.rate  = rEl.value || 'RATE_18';
      this.$nextTick(() => recalcGrandTotal());
    },

    subtotal()    { return this.qty * this.price; },
    itbisAmt()    { return this.subtotal() * (this.rateMap[this.rate] || 0); },
    rowTotal()    { return this.subtotal() + this.itbisAmt(); },
    fmt(n)        { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); },
    fmtSubtotal() { return this.fmt(this.subtotal()); },
    fmtItbis()    { return this.fmt(this.itbisAmt()); },
    fmtTotal()    { return this.fmt(this.rowTotal()); },
    recalc()      { recalcGrandTotal(); },
  }
}

// ── Row deletion — global so native onclick works ────────────────────────────
function deleteRow(btn) {
  const row     = btn.closest('tr');
  const next    = row && row.nextElementSibling;
  const descRow = next && next.classList.contains('item-row-desc') ? next : null;
  const delEl   = row ? row.querySelector('[name$="-DELETE"]') : null;
  if (delEl) {
    delEl.checked = true;
    row.style.display = 'none';
    if (descRow) descRow.style.display = 'none';
  } else if (row) {
    if (descRow) descRow.remove();
    row.remove();
  }
  recalcGrandTotal();
}

// ── Item picker modal — plain JS (no Alpine) ─────────────────────────────────
var _picker = { selectedPk: null };

function _pickerRender(query) {
  var catalog  = window.ITEM_CATALOG || [];
  var q        = (query || '').toLowerCase().trim();
  var filtered = q
    ? catalog.filter(function(i) {
        return (i.name || '').toLowerCase().includes(q) ||
               (i.code || '').toLowerCase().includes(q);
      })
    : catalog;

  var tbody   = document.getElementById('picker-tbody');
  var countEl = document.getElementById('picker-count');
  var selBtn  = document.getElementById('picker-select-btn');
  if (!tbody) return;

  tbody.innerHTML  = '';
  _picker.selectedPk = null;
  if (selBtn) selBtn.disabled = true;

  var fmt = function(n) {
    return parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  };

  if (filtered.length === 0) {
    var empty = document.createElement('tr');
    var emptyTd = document.createElement('td');
    emptyTd.colSpan = 3;
    emptyTd.className = 'text-center text-muted py-4';
    emptyTd.innerHTML = '<i class="bi bi-inbox me-1"></i>No se encontraron artículos.';
    empty.appendChild(emptyTd);
    tbody.appendChild(empty);
  } else {
    filtered.forEach(function(item) {
      var tr    = document.createElement('tr');
      tr.style.cursor = 'pointer';

      var td1 = document.createElement('td');
      td1.className   = 'text-muted small font-monospace';
      td1.textContent = item.code || '—';

      var td2  = document.createElement('td');
      var div  = document.createElement('div');
      div.className   = 'fw-semibold';
      div.textContent = item.name || '';
      td2.appendChild(div);

      var td3 = document.createElement('td');
      td3.className   = 'text-end';
      td3.textContent = fmt(item.unit_price);

      tr.appendChild(td1);
      tr.appendChild(td2);
      tr.appendChild(td3);

      tr.addEventListener('click', function() {
        tbody.querySelectorAll('tr').forEach(function(r) {
          r.classList.remove('table-primary');
        });
        tr.classList.add('table-primary');
        _picker.selectedPk = item.pk;
        if (selBtn) selBtn.disabled = false;
      });

      tr.addEventListener('dblclick', function() { _pickerSelect(item.pk); });
      tbody.appendChild(tr);
    });
  }

  if (countEl) countEl.textContent = filtered.length + ' artículo(s)';
}

function _pickerSelect(pk) {
  if (!pk) return;
  if (window.activeItemRow) pickCatalogRow(window.activeItemRow, pk);
  bootstrap.Modal.getOrCreateInstance(document.getElementById('itemPickerModal')).hide();
  _picker.selectedPk = null;
}

// ── Open picker: store active row ref, show modal ────────────────────────────
function openItemPicker(rowEl) {
  window.activeItemRow = rowEl;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('itemPickerModal')).show();
}

// ── Apply a catalog selection to a row element ────────────────────────────────
function pickCatalogRow(rowEl, pk) {
  const catalog = window.ITEM_CATALOG || [];
  const item    = catalog.find(i => i.pk === pk);
  if (!item) return;

  const next    = rowEl.nextElementSibling;
  const descEl  = rowEl.querySelector('[name$="-description"]') ||
                  (next && next.querySelector('[name$="-description"]'));
  const priceEl = rowEl.querySelector('[name$="-unit_price"]');
  const qtyEl   = rowEl.querySelector('[name$="-quantity"]');
  const rateEl  = rowEl.querySelector('[name$="-itbis_rate"]');
  const itemEl  = rowEl.querySelector('[name$="-item"]');

  if (descEl)  descEl.value  = item.name;
  if (itemEl)  itemEl.value  = pk;
  if (priceEl) priceEl.value = item.unit_price;
  if (qtyEl)   qtyEl.value   = '1';
  if (rateEl)  rateEl.value  = item.itbis_rate;

  // Direct assignments go through Alpine's reactive proxy set trap → x-text spans recompute.
  // Comma operator = single expression; valid inside Alpine.evaluate's `return (expr)` wrapper.
  // applyItem(method) breaks `this` binding when called via `with(proxy)`.
  if (typeof Alpine !== 'undefined') {
    try {
      Alpine.evaluate(rowEl,
        `price = ${parseFloat(item.unit_price) || 0}, qty = 1, rate = '${item.itbis_rate || "RATE_18"}'`
      );
    } catch (e) {
      console.warn('pickCatalogRow: Alpine.evaluate failed', e);
    }
  }

  recalcGrandTotal();
}

// ── Grand-total footer + per-row span recalculation ──────────────────────────
function recalcGrandTotal() {
  const fmt    = n => n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const rateMap = { EXEMPT: 0, RATE_0: 0, RATE_16: 0.16, RATE_18: 0.18 };
  let subtotal = 0, itbis18 = 0, itbis16 = 0;

  document.querySelectorAll('#item-tbody tr').forEach(row => {
    const qEl = row.querySelector('[name$="-quantity"]');
    const pEl = row.querySelector('[name$="-unit_price"]');
    const rEl = row.querySelector('[name$="-itbis_rate"]');
    const dEl = row.querySelector('[name$="-DELETE"]');
    if (!qEl || !pEl || !rEl) return;

    const deleted = dEl && dEl.checked;
    const qty     = parseInt(qEl.value, 10) || 0;
    const price   = parseFloat(pEl.value) || 0;
    const rate    = rEl.value;
    const base    = qty * price;
    const itbis   = base * (rateMap[rate] || 0);

    // Per-row spans — pure DOM, no Alpine dependency.
    const subSpan = row.querySelector('.row-subtotal');
    const itbSpan = row.querySelector('.row-itbis');
    const totSpan = row.querySelector('.row-total');
    if (subSpan) subSpan.textContent = deleted ? '0.00' : fmt(base);
    if (itbSpan) itbSpan.textContent = deleted ? '0.00' : fmt(itbis);
    if (totSpan) totSpan.textContent = deleted ? '0.00' : fmt(base + itbis);

    if (deleted) return;
    subtotal += base;
    if (rate === 'RATE_18') itbis18 += itbis;
    else if (rate === 'RATE_16') itbis16 += itbis;
  });

  const el = id => document.getElementById(id);
  if (el('grand-subtotal')) el('grand-subtotal').textContent = fmt(subtotal);
  if (el('grand-itbis18'))  el('grand-itbis18').textContent  = fmt(itbis18);
  if (el('grand-itbis16'))  el('grand-itbis16').textContent  = fmt(itbis16);
  if (el('grand-total'))    el('grand-total').textContent    = fmt(subtotal + itbis18 + itbis16);
}

document.addEventListener('DOMContentLoaded', function() {
  recalcGrandTotal();

  // Native delegation — fires recalcGrandTotal() on direct typing independent of Alpine.
  var tbody = document.getElementById('item-tbody');
  if (tbody) {
    tbody.addEventListener('input', function(e) {
      var n = e.target.name || '';
      if (n.endsWith('-quantity')) {
        var val = parseFloat(e.target.value);
        var warn = e.target.closest('td') && e.target.closest('td').querySelector('.qty-warning');
        if (warn) warn.classList.toggle('d-none', !val || val <= 0 || Number.isInteger(val));
        recalcGrandTotal();
      } else if (n.endsWith('-unit_price')) {
        recalcGrandTotal();
      }
    });
    tbody.addEventListener('change', function(e) {
      var n = e.target.name || '';
      if (n.endsWith('-itbis_rate')) recalcGrandTotal();
    });
  }

  var pickerModal  = document.getElementById('itemPickerModal');
  var pickerSearch = document.getElementById('picker-search');
  var pickerSelBtn = document.getElementById('picker-select-btn');

  if (pickerSearch) {
    pickerSearch.addEventListener('input', function() { _pickerRender(this.value); });
  }
  if (pickerSelBtn) {
    pickerSelBtn.addEventListener('click', function() { _pickerSelect(_picker.selectedPk); });
  }
  if (pickerModal) {
    pickerModal.addEventListener('shown.bs.modal', function() {
      _pickerRender('');
      if (pickerSearch) { pickerSearch.value = ''; pickerSearch.focus(); }
    });
    pickerModal.addEventListener('hidden.bs.modal', function() {
      _picker.selectedPk = null;
    });
  }
});

document.body.addEventListener('htmx:afterSwap', function (e) {
  if (e.detail.target && e.detail.target.id === 'item-tbody') {
    // Two rows appended: desc row last, main row (x-data) second-to-last.
    const descRow = e.detail.target.lastElementChild;
    const mainRow = descRow && descRow.previousElementSibling;
    if (mainRow && typeof Alpine !== 'undefined') Alpine.initTree(mainRow);
  }
  recalcGrandTotal();
});
</script>
