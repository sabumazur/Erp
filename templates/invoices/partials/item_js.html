{# Shared Alpine.js / vanilla JS for the invoice item formset #}
<script>
function itemRow() {
  return {
    qty:   1, price: 0, rate: 'RATE_18',
    rateMap: { EXEMPT: 0, RATE_0: 0, RATE_16: 0.16, RATE_18: 0.18 },
    init() {
      const row = this.$el;
      const qEl = row.querySelector('[name$="-quantity"]');
      const pEl = row.querySelector('[name$="-unit_price"]');
      const rEl = row.querySelector('[name$="-itbis_rate"]');
      if (qEl) this.qty   = parseFloat(qEl.value) || 1;
      if (pEl) this.price = parseFloat(pEl.value) || 0;
      if (rEl) this.rate  = rEl.value || 'RATE_18';
      this.$nextTick(() => recalcGrandTotal());
    },
    subtotal()     { return this.qty * this.price; },
    itbisAmt()     { return this.subtotal() * (this.rateMap[this.rate] || 0); },
    rowTotal()     { return this.subtotal() + this.itbisAmt(); },
    fmt(n)         { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); },
    fmtSubtotal()  { return this.fmt(this.subtotal()); },
    fmtItbis()     { return this.fmt(this.itbisAmt()); },
    fmtTotal()     { return this.fmt(this.rowTotal()); },
    recalc()       { recalcGrandTotal(); },
  }
}

function recalcGrandTotal() {
  let subtotal = 0, itbis18 = 0, itbis16 = 0;
  document.querySelectorAll('#item-tbody tr').forEach(row => {
    const qEl = row.querySelector('[name$="-quantity"]');
    const pEl = row.querySelector('[name$="-unit_price"]');
    const rEl = row.querySelector('[name$="-itbis_rate"]');
    const dEl = row.querySelector('[name$="-DELETE"]');
    if (!qEl || !pEl || !rEl) return;
    if (dEl && dEl.checked) return;
    const qty   = parseFloat(qEl.value) || 0;
    const price = parseFloat(pEl.value) || 0;
    const rate  = rEl.value;
    const base  = qty * price;
    const rateMap = { EXEMPT: 0, RATE_0: 0, RATE_16: 0.16, RATE_18: 0.18 };
    const itbis = base * (rateMap[rate] || 0);
    subtotal += base;
    if (rate === 'RATE_18') itbis18 += itbis;
    else if (rate === 'RATE_16') itbis16 += itbis;
  });
  const fmt = n => n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const el = id => document.getElementById(id);
  if (el('grand-subtotal')) el('grand-subtotal').textContent = fmt(subtotal);
  if (el('grand-itbis18'))  el('grand-itbis18').textContent  = fmt(itbis18);
  if (el('grand-itbis16'))  el('grand-itbis16').textContent  = fmt(itbis16);
  if (el('grand-total'))    el('grand-total').textContent    = fmt(subtotal + itbis18 + itbis16);
}

document.addEventListener('DOMContentLoaded', recalcGrandTotal);
document.body.addEventListener('htmx:afterSwap', recalcGrandTotal);
</script>
