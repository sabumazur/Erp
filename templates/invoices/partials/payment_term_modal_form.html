{% load crispy_forms_tags i18n %}
<form hx-post="{{ action_url }}"
      hx-target="#dt-results"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful && event.target === this) bootstrap.Modal.getInstance('#paymentTermModal').hide()"
      class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <div class="modal-body">
    {% crispy form %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancelar" %}</button>
    <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
  </div>
</form>
