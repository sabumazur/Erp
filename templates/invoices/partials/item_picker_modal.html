{% load i18n %}
<div class="modal fade"
     id="itemPickerModal"
     tabindex="-1"
     aria-labelledby="itemPickerModalLabel"
     aria-hidden="true"
     x-data="itemPickerModal()"
     x-on:shown.bs.modal="$refs.searchInput.focus(); query = ''; selectedPk = null"
     x-on:hidden.bs.modal="selectedPk = null">

  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="itemPickerModalLabel">
          <i class="bi bi-box-seam me-2"></i>{% trans "Seleccionar artículo" %}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-0">

        <div class="p-3 border-bottom">
          <input type="text"
                 class="form-control"
                 placeholder="{% trans 'Buscar por nombre, código o descripción…' %}"
                 x-ref="searchInput"
                 x-model="query"
                 autocomplete="off">
        </div>

        <div class="table-responsive" style="max-height:420px">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light sticky-top">
              <tr>
                <th style="width:110px">{% trans "Código" %}</th>
                <th>{% trans "Nombre / Descripción" %}</th>
                <th class="text-end" style="width:120px">{% trans "Precio" %}</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in filtered" :key="item.pk">
                <tr style="cursor:pointer"
                    :class="selectedPk === item.pk ? 'table-primary' : ''"
                    x-on:click="selectedPk = item.pk"
                    x-on:dblclick="select(item.pk)">
                  <td class="text-muted small font-monospace" x-text="item.code || '—'"></td>
                  <td>
                    <div class="fw-semibold" x-text="item.name"></div>
                    <div class="text-muted small"
                         x-text="item.description"
                         x-show="item.description && item.description !== item.name"></div>
                  </td>
                  <td class="text-end"
                      x-text="parseFloat(item.unit_price).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')"></td>
                </tr>
              </template>
              <tr x-show="filtered.length === 0">
                <td colspan="3" class="text-center text-muted py-4">
                  <i class="bi bi-inbox me-1"></i>{% trans "No se encontraron artículos." %}
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

      <div class="modal-footer">
        <small class="text-muted me-auto"
               x-text="`${filtered.length} {% trans 'artículo(s)' %}`"></small>
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
          {% trans "Cancelar" %}
        </button>
        <button type="button"
                class="btn btn-primary btn-sm"
                :disabled="!selectedPk"
                x-on:click="select(selectedPk)">
          <i class="bi bi-check-lg me-1"></i>{% trans "Seleccionar" %}
        </button>
      </div>

    </div>
  </div>
</div>
