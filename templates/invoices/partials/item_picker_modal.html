{% load i18n %}
<div class="modal fade"
     id="itemPickerModal"
     tabindex="-1"
     aria-labelledby="itemPickerModalLabel"
     aria-hidden="true">

  <div class="modal-dialog picker-dialog">
    <div class="modal-content picker-content">

      <div class="picker-head">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="picker-icon-badge"><i class="bi bi-box-seam"></i></span>
          <span class="picker-title" id="itemPickerModalLabel">{% trans "Catálogo de artículos" %}</span>
          <button type="button" class="picker-x-btn ms-auto" data-bs-dismiss="modal" aria-label="{% trans 'Cerrar' %}">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="picker-search-box">
          <i class="bi bi-search picker-search-icon"></i>
          <input type="text"
                 id="picker-search"
                 class="picker-search-input"
                 placeholder="{% trans 'Buscar por nombre o código…' %}"
                 autocomplete="off">
        </div>
      </div>

      <div class="picker-col-header">
        <span class="picker-ch-code">{% trans "Código" %}</span>
        <span class="picker-ch-name">{% trans "Artículo" %}</span>
        <span class="picker-ch-price">{% trans "Precio" %}</span>
      </div>

      <div class="picker-list-wrap">
        <table class="picker-table w-100">
          <tbody id="picker-tbody"></tbody>
        </table>
      </div>

      <div class="picker-foot">
        <span class="picker-count" id="picker-count"></span>
        <div class="d-flex gap-2">
          <button type="button" class="picker-cancel-btn" data-bs-dismiss="modal">
            {% trans "Cancelar" %}
          </button>
          <button type="button"
                  class="btn btn-sm btn-module-accent"
                  id="picker-select-btn"
                  disabled>
            <i class="bi bi-check-lg me-1"></i>{% trans "Seleccionar" %}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
