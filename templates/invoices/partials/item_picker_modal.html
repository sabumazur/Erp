{% load i18n %}
<div class="modal fade"
     id="itemPickerModal"
     tabindex="-1"
     aria-labelledby="itemPickerModalLabel"
     aria-hidden="true">

  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="itemPickerModalLabel">
          <i class="bi bi-box-seam me-2"></i>{% trans "Seleccionar artículo" %}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-0">

        <div class="p-3 border-bottom">
          <input type="text"
                 id="picker-search"
                 class="form-control"
                 placeholder="{% trans 'Buscar por nombre, código o descripción…' %}"
                 autocomplete="off">
        </div>

        <div class="table-responsive" style="max-height:420px">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light sticky-top">
              <tr>
                <th style="width:110px">{% trans "Código" %}</th>
                <th>{% trans "Nombre / Descripción" %}</th>
                <th class="text-end" style="width:120px">{% trans "Precio" %}</th>
              </tr>
            </thead>
            <tbody id="picker-tbody"></tbody>
          </table>
        </div>

      </div>

      <div class="modal-footer">
        <small class="text-muted me-auto" id="picker-count"></small>
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
          {% trans "Cancelar" %}
        </button>
        <button type="button"
                class="btn btn-primary btn-sm"
                id="picker-select-btn"
                disabled>
          <i class="bi bi-check-lg me-1"></i>{% trans "Seleccionar" %}
        </button>
      </div>

    </div>
  </div>
</div>
