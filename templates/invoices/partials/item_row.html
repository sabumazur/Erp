{% load i18n %}
{# Single InvoiceItem form row — returned by InvoiceItemRowView for HTMX append #}
<tr x-data="itemRow()" class="align-middle">
  <td>{{ form.description }}</td>
  <td style="width:110px">{{ form.quantity }}</td>
  <td style="width:130px">{{ form.unit_price }}</td>
  <td style="width:130px">{{ form.itbis_rate }}</td>
  <td class="text-end fw-semibold" style="width:130px">
    <span x-text="fmtSubtotal()">0.00</span>
  </td>
  <td class="text-end text-muted" style="width:110px">
    <span x-text="fmtItbis()">0.00</span>
  </td>
  <td class="text-end fw-semibold" style="width:130px">
    <span x-text="fmtTotal()">0.00</span>
  </td>
  <td style="width:40px">
    {{ form.DELETE }}
    <button type="button"
            class="btn btn-outline-danger btn-sm"
            x-on:click="$el.closest('tr').remove(); window.recalcGrandTotal()">
      <i class="bi bi-trash"></i>
    </button>
  </td>
  {# Hidden management fields #}
  {{ form.id }}
</tr>

<script>
function itemRow() {
  return {
    qty:   parseFloat('{{ form.quantity.value|default:"1" }}') || 1,
    price: parseFloat('{{ form.unit_price.value|default:"0" }}') || 0,
    rate:  '{{ form.itbis_rate.value|default:"RATE_18" }}',
    rateMap: { EXEMPT: 0, RATE_0: 0, RATE_16: 0.16, RATE_18: 0.18 },
    subtotal()  { return this.qty * this.price; },
    itbisAmt()  { return this.subtotal() * (this.rateMap[this.rate] || 0); },
    rowTotal()  { return this.subtotal() + this.itbisAmt(); },
    fmt(n)      { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); },
    fmtSubtotal() { return this.fmt(this.subtotal()); },
    fmtItbis()    { return this.fmt(this.itbisAmt()); },
    fmtTotal()    { return this.fmt(this.rowTotal()); },
    recalc()    { window.recalcGrandTotal && window.recalcGrandTotal(); },
  }
}
</script>
