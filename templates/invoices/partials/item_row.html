{% load i18n %}
<tr x-data="itemRow()" class="align-middle">
  <td>
    <div class="d-flex gap-1 align-items-center">
      <button type="button"
              class="btn btn-outline-secondary btn-sm flex-shrink-0"
              title="{% trans 'Buscar en catálogo' %}"
              x-on:click="openItemPicker($el.closest('tr'))">
        <i class="bi bi-search"></i>
      </button>
      {{ form.description }}
    </div>
    {{ form.item }}
  </td>
  <td style="width:110px">{{ form.quantity }}</td>
  <td style="width:130px">{{ form.unit_price }}</td>
  <td style="width:130px">{{ form.itbis_rate }}</td>
  <td class="text-end fw-semibold" style="width:130px">
    <span x-text="fmtSubtotal()">0.00</span>
  </td>
  <td class="text-end text-muted" style="width:110px">
    <span x-text="fmtItbis()">0.00</span>
  </td>
  <td class="text-end fw-semibold" style="width:130px">
    <span x-text="fmtTotal()">0.00</span>
  </td>
  <td style="width:40px">
    <div style="display:none">{{ form.DELETE }}</div>
    <button type="button"
            class="btn btn-outline-danger btn-sm"
            x-on:click="deleteRow($el)">
      <i class="bi bi-trash"></i>
    </button>
  </td>
  {{ form.id }}
</tr>
