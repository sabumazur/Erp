{% load i18n %}
{% comment %}Filter offcanvas body for the sale-order datatable. Requires 'filter' (SaleOrderFilter).{% endcomment %}

<div class="mb-3">
  <label class="form-label small text-muted text-uppercase fw-semibold">{% trans "Estado" %}</label>
  {{ filter.form.status }}
</div>

<div class="mb-3">
  <label class="form-label small text-muted text-uppercase fw-semibold">{% trans "Cliente" %}</label>
  {{ filter.form.customer }}
</div>

<div class="mb-3">
  <label class="form-label small text-muted text-uppercase fw-semibold">{% trans "Departamento" %}</label>
  {{ filter.form.department }}
</div>

<div class="mb-3">
  <label class="form-label small text-muted text-uppercase fw-semibold">{% trans "Fecha entrega" %}</label>
  <div class="d-flex gap-2 align-items-center">
    {{ filter.form.delivery_date_after }}
    <span class="text-muted small">—</span>
    {{ filter.form.delivery_date_before }}
  </div>
</div>
