{% load i18n %}
{% comment %}Filter offcanvas body for the quotation datatable. Requires 'filter' (QuotationFilter).{% endcomment %}

<div class="mb-3">
  <label class="rpt-filter-label">{% trans "Estado" %}</label>
  {{ filter.form.status }}
</div>

<div class="mb-3">
  <label class="rpt-filter-label">{% trans "Cliente" %}</label>
  {{ filter.form.customer }}
</div>

<div class="mb-3">
  <label class="rpt-filter-label">{% trans "Fecha emisión" %}</label>
  <div class="d-flex gap-2 align-items-center">
    {{ filter.form.issue_date_after }}
    <span class="text-muted small">—</span>
    {{ filter.form.issue_date_before }}
  </div>
</div>
