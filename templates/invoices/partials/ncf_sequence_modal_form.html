{% load crispy_forms_tags i18n %}
<form hx-post="{{ action_url }}"
      hx-target="#ncf-sequence-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful && event.target === this) bootstrap.Modal.getInstance('#ncfSequenceModal').hide()"
      class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <div class="modal-body">
    {% crispy form %}
  </div>
  <div class="modal-footer border-top" style="background:#F8F9FA">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">{% trans "Cancelar" %}</button>
    <button type="submit" class="btn btn-primary btn-sm">{% trans "Registrar" %}</button>
  </div>
</form>
