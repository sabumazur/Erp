{% extends "base.html" %}
{% load static %}

{% block body %}
<div class="auth-split">

  {# ── Form panel ──────────────────────────────────────────── #}
  <main class="auth-panel">
    <a href="/" class="auth-mobile-logo d-flex d-md-none">
      <img src="{% static 'img/sabsys-logo.png' %}" alt="SabSys" style="height:28px;width:auto;">
    </a>
    {% include "partials/_messages.html" %}
    {% block content %}{% endblock %}
  </main>

</div>

<style>
/* ── Auth split layout ─────────────────────────────────────── */
.auth-split {
  display: flex;
  min-height: 100vh;
}

/* ── Form panel ──────────────────────────────────────────── */
.auth-panel {
  flex: 1;
  min-height: 100vh;
  background: #f4f6fb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  overflow-y: auto;
}

.auth-mobile-logo {
  font-size: 1.1rem;
  font-weight: 700;
  color: #1e2130;
  text-decoration: none;
  margin-bottom: 28px;
  align-items: center;
  gap: 8px;
}
.auth-mobile-logo .bi { color: #5b9af5; }

/* ── Auth card ───────────────────────────────────────────── */
.auth-card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 10px;
  border-top: 4px solid #1e2130;
  box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.06);
  padding: 32px 36px;
}

.auth-card-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -.02em;
  color: #0f172a;
  line-height: 1.1;
  margin: 0 0 4px;
}

.auth-card-sub {
  font-size: 0.8rem;
  color: #94a3b8;
  margin: 0 0 24px;
}

.auth-divider {
  border: none;
  border-top: 1px solid #eef0f6;
  margin: 20px 0;
}

.auth-foot {
  text-align: center;
  font-size: 0.82rem;
  color: #64748b;
  margin: 0;
}
.auth-foot a { color: #1e2130; font-weight: 600; text-decoration: none; }
.auth-foot a:hover { text-decoration: underline; }

/* ── Buttons ─────────────────────────────────────────────── */
.auth-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: background .14s, border-color .14s;
  border: none;
  line-height: 1.4;
}
.auth-btn-primary {
  background: #1e2130;
  color: #fff !important;
}
.auth-btn-primary:hover { background: #2a3050; color: #fff; }
.auth-btn-secondary {
  background: transparent;
  color: #1e2130 !important;
  border: 1px solid #d1d5db;
}
.auth-btn-secondary:hover { background: #f8f9fa; border-color: #9ca3af; }

/* ── Status icon ─────────────────────────────────────────── */
.auth-status-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin: 0 auto 20px;
}
.auth-status-icon.is-success { background: rgba(16,185,129,.1);  color: #059669; }
.auth-status-icon.is-warning { background: rgba(245,158,11,.1);  color: #d97706; }
.auth-status-icon.is-primary { background: rgba(91,154,245,.12); color: #5b9af5; }
.auth-status-icon.is-danger  { background: rgba(239,68,68,.1);   color: #dc2626; }
.auth-status-icon.is-muted   { background: #f1f3f7; color: #94a3b8; }

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 767.98px) {
  .auth-panel { padding: 32px 16px; }
  .auth-card  { padding: 24px 20px; }
}
</style>
{% endblock %}
