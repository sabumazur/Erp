{% load i18n humanize %}
{% for item in items %}
<button type="button"
        class="d-block w-100 text-start px-3 py-2 border-0 bg-transparent item-pick-btn"
        style="cursor:pointer"
        data-desc="{{ item.name|escapejs }}"
        data-price="{{ item.unit_price }}"
        data-rate="{{ item.itbis_rate }}"
        data-pk="{{ item.pk }}"
        onclick="pickCatalogItem(this)">
  <div class="fw-semibold small lh-sm">
    {% if item.code %}<code class="text-muted me-1">{{ item.code }}</code>{% endif %}
    {{ item.name }}
  </div>
  <div class="text-muted text-xs">
    {{ item.get_unit_display }} &middot; {{ item.unit_price|floatformat:2|intcomma }} &middot; {{ item.get_itbis_rate_display }}
  </div>
</button>
{% empty %}
<div class="px-3 py-2 text-muted small">{% trans "Sin resultados" %}</div>
{% endfor %}
