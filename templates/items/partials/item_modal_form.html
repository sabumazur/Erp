{% load crispy_forms_tags i18n %}
<form hx-post="{{ action_url }}"
      hx-target="#dt-results"
      hx-swap="innerHTML"
      data-modal-close="#itemModal"
      x-data="itemForm('{{ initial_item_type|default:'BOTH' }}')"
      x-init="init()"
      class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <div class="modal-body">
    {% crispy form %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">{% trans "Cancelar" %}</button>
    <button type="submit" class="btn btn-sm btn-brand">{{ submit_label }}</button>
  </div>
</form>
