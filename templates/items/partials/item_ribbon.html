{% load i18n %}
{# Ribbon actions for the item list. Rendered inside .dt-ribbon-left inside #dt-wrapper (Alpine dtTable() scope). #}

{% if membership.is_admin %}
<button type="button" class="btn btn-sm btn-brand"
        data-bs-toggle="modal" data-bs-target="#itemModal">
  <i class="bi bi-plus-lg me-1"></i>{% trans "Nuevo" %}
</button>

<span class="dt-ribbon-sep"></span>
{% endif %}

<button type="button" class="btn btn-outline-secondary"
        :disabled="!canAct"
        :class="{'disabled': !canAct}"
        @click="canAct && (window.location.href = document.querySelector('tr.dt-row-selected [data-action=view]')?.href || '#')">
  <i class="bi bi-eye me-1"></i>{% trans "Ver" %}
</button>

{% if membership.is_admin %}
<button type="button" class="btn btn-outline-secondary"
        :disabled="!canAct"
        :class="{'disabled': !canAct}"
        @click="canAct && document.querySelector('tr.dt-row-selected [data-action=edit]')?.click()">
  <i class="bi bi-pencil me-1"></i>{% trans "Editar" %}
</button>

<button type="button" class="btn btn-outline-secondary"
        :disabled="!canAct"
        :class="{'disabled': !canAct}"
        @click="canAct && document.querySelector('tr.dt-row-selected [data-action=toggle]')?.click()">
  <i class="bi bi-toggle-on me-1"></i>{% trans "Activar/Desactivar" %}
</button>

<button type="button" class="btn btn-outline-secondary"
        :disabled="!canAct"
        :class="{'disabled': !canAct, 'text-danger': canAct}"
        @click="canAct && document.querySelector('tr.dt-row-selected [data-action=delete]')?.click()">
  <i class="bi bi-trash me-1"></i>{% trans "Eliminar" %}
</button>
{% endif %}

<span class="dt-ribbon-sep"></span>

{% include "components/datatable/export_csv_button.html" %}
