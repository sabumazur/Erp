{% load i18n humanize %}
<tr data-pk="{{ row.pk }}"
    data-status="PAID"
    data-detail-url="{% url 'purchases:supplier_payment_detail' row.pk %}">

  <td data-col="supplier__name">
    <div class="d-flex align-items-center">
      <a href="{% url 'purchases:supplier_payment_detail' row.pk %}"
         class="text-decoration-none fw-semibold" style="color:#1e2130">
        {{ row.supplier.name }}
      </a>
      <span class="dt-row-actions">
        <div class="dropdown dt-kebab">
          <button type="button" class="btn btn-link btn-sm p-0 dt-kebab-btn"
                  data-bs-toggle="dropdown" data-bs-boundary="viewport" tabindex="-1">
            <i class="bi bi-three-dots-vertical"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            <li><a class="dropdown-item" href="{% url 'purchases:supplier_payment_detail' row.pk %}" data-action="view">
              <i class="bi bi-eye me-2"></i>{% trans "Ver" %}</a></li>
          </ul>
        </div>
      </span>
    </div>
  </td>
  <td data-col="date" class="font-monospace">{{ row.date }}</td>
  <td data-col="method">{{ row.get_method_display }}</td>
  <td data-col="amount" class="text-end font-monospace">{{ row.amount|intcomma }}</td>

</tr>
