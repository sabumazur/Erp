{% load i18n %}
{% for supplier in suppliers %}
<tr class="supplier-picker-row"
    data-pk="{{ supplier.pk }}"
    data-name="{{ supplier.name|escapejs }}"
    data-rnc-cedula="{{ supplier.rnc_cedula|escapejs }}"
    onclick="supplierPickerSelect('{{ supplier.pk }}', '{{ supplier.name|escapejs }}', '{{ supplier.rnc_cedula|escapejs }}')"
    style="cursor:pointer">
  <td>{{ supplier.name }}</td>
  <td class="font-monospace small">{{ supplier.rnc_cedula|default:"-" }}</td>
  <td class="d-none d-md-table-cell">{{ supplier.email|default:"-" }}</td>
  <td class="d-none d-md-table-cell">{{ supplier.phone|default:"-" }}</td>
</tr>
{% empty %}
<tr>
  <td colspan="4" class="text-center text-muted py-4">
    <i class="bi bi-inbox me-1"></i>{% trans "No se encontraron proveedores." %}
  </td>
</tr>
{% endfor %}
