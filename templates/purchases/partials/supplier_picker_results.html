{% load i18n %}
{% for supplier in suppliers %}
<div class="supplier-picker-item p-2 border-bottom" style="cursor:pointer"
     data-supplier-id="{{ supplier.pk }}"
     data-supplier-name="{{ supplier.name }}"
     data-supplier-id-number="{{ supplier.id_number }}">
  <div class="fw-semibold" style="font-size:.85rem">{{ supplier.name }}</div>
  {% if supplier.id_number %}
    <div class="text-muted font-monospace" style="font-size:.7rem">{{ supplier.id_number }}</div>
  {% endif %}
</div>
{% empty %}
<div class="text-muted small p-3">{% trans "No se encontraron proveedores." %}</div>
{% endfor %}
