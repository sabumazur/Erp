{% load crispy_forms_tags i18n %}
<form hx-post="{{ action_url }}"
      hx-target="#ncf-sequence-table .dt-slate"
      hx-swap="innerHTML"
      data-modal-close="#ncfSequenceModal"
      class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <div class="modal-body">
    {% crispy form %}
  </div>
  <div class="modal-footer border-top bg-light">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">{% trans "Cancelar" %}</button>
    <button type="submit" class="btn btn-brand btn-sm">
      {% if submit_label %}{{ submit_label }}{% else %}{% trans "Registrar" %}{% endif %}
    </button>
  </div>
</form>
