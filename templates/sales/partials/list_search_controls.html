{% load i18n %}
{# ── Row 2: search + filter controls ─────────────────────────────────────── #}
<div class="d-flex gap-2 align-items-center mb-3 flex-wrap">
  <div class="input-group" style="max-width:280px">
    <span class="input-group-text bg-transparent border-end-0">
      <i class="bi bi-search text-muted"></i>
    </span>
    <input type="search" name="q" value="{{ request.GET.q }}"
           class="form-control border-start-0 ps-0"
           autocomplete="off"
           placeholder="{{ search_placeholder }}">
  </div>
  <button type="button"
          class="btn btn-outline-secondary btn-sm"
          data-bs-toggle="offcanvas"
          data-bs-target="#filterOffcanvas">
    <i class="bi bi-funnel{% if active_filter_count %}-fill{% endif %} me-1"></i>
    {% trans "Filtros" %}
    {% if active_filter_count %}
      <span class="badge bg-primary rounded-pill ms-1">{{ active_filter_count }}</span>
    {% endif %}
  </button>
  {% if active_filter_count or request.GET.q %}
  <a href="{% url list_url %}" class="btn btn-outline-secondary btn-sm" title="{% trans 'Limpiar filtros' %}">
    <i class="bi bi-x-lg"></i>
  </a>
  {% endif %}
</div>
