{% load i18n %}
{# Ribbon actions for the invoice list. Rendered inside .dt-ribbon-left inside #dt-wrapper (Alpine dtTable() scope). #}

<a href="{% url 'sales:invoice_create' %}" class="btn btn-sm btn-brand">
  <i class="bi bi-plus-lg me-1"></i>{% trans "Nueva" %}
</a>

<span class="dt-ribbon-sep"></span>

<button type="button" class="btn btn-outline-secondary btn-sm"
        :disabled="!canAct"
        :class="{'disabled': !canAct}"
        @click="canAct && (window.location.href = document.querySelector('tr.dt-row-selected [data-action=view]')?.href || '#')">
  <i class="bi bi-eye me-1"></i>{% trans "Ver" %}
</button>

<button type="button" class="btn btn-outline-secondary btn-sm"
        :disabled="!canAct || selectedStatus !== 'DRAFT'"
        :class="{'disabled': !canAct || selectedStatus !== 'DRAFT'}"
        @click="canAct && selectedStatus === 'DRAFT' && document.querySelector('tr.dt-row-selected [data-action=edit]')?.click()">
  <i class="bi bi-pencil me-1"></i>{% trans "Editar" %}
</button>

<span class="dt-ribbon-sep"></span>

{% include "components/datatable/export_csv_button.html" %}
