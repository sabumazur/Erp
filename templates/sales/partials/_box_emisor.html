{% comment %}
  Issuer (Emisor) info card (one cell of the parties row).
  Context used: org
{% endcomment %}
{% load i18n %}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td style="background:#f8f9fa;border-left:3px solid #1e2130;border-radius:0 4px 4px 0;padding:10px 12px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#6b7280;font-weight:700;margin-bottom:4px;">{% trans "Emisor" %}</div>
      <div style="font-weight:700;font-size:13px;color:#1a1a1a;">{{ org.name }}</div>
      {% if org.tax_id %}<div style="font-size:11px;color:#555;margin-top:2px;">RNC: {{ org.tax_id }}</div>{% endif %}
    </td>
  </tr>
</table>
