{% load i18n %}
<tr data-pk="{{ row.pk }}"
    data-status=""
    data-detail-url="">

  <td data-col="name" class="fw-semibold" style="font-size:.85rem;color:#1e2130">
    <button type="button"
            class="btn btn-link p-0 fw-semibold text-decoration-none link-brand"
            style="font-size:.85rem"
            hx-get="{% url 'sales:payment_term_edit' row.pk %}"
            hx-target="#payment-term-modal-body"
            onclick="event.stopPropagation()"
            data-modal-open="#paymentTermModal">
      {{ row.name }}
    </button>
    <span class="dt-row-actions">
      <div class="dropdown dt-kebab">
        <button type="button"
                class="btn btn-link btn-sm p-0 dt-kebab-btn" aria-label="{% trans 'Acciones' %}"
                data-bs-toggle="dropdown"
                data-bs-boundary="viewport"
                aria-expanded="false"
                tabindex="-1">
          <i class="bi bi-three-dots-vertical"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li>
            <button type="button" class="dropdown-item" data-action="edit"
                    hx-get="{% url 'sales:payment_term_edit' row.pk %}"
                    hx-target="#payment-term-modal-body"
                    data-modal-open="#paymentTermModal">
              <i class="bi bi-pencil me-2"></i>{% trans "Editar" %}
            </button>
          </li>
          <li><hr class="dropdown-divider my-1"></li>
          <li>
            <button type="button" class="dropdown-item text-danger" data-action="delete"
                    onclick="Swal.fire({
                      icon: 'warning',
                      title: '{% trans "¿Eliminar término?" %}',
                      html: '<strong>{{ row.name|escapejs }}</strong>',
                      showCancelButton: true,
                      confirmButtonText: '{% trans "Eliminar" %}',
                      cancelButtonText: '{% trans "Cancelar" %}',
                      confirmButtonColor: '#dc3545',
                    }).then(r => {
                      if (r.isConfirmed)
                        htmx.ajax('POST', '{% url 'sales:payment_term_delete' row.pk %}',
                          { target: '#dt-results', swap: 'innerHTML',
                            values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
                    })">
              <i class="bi bi-trash me-2"></i>{% trans "Eliminar" %}
            </button>
          </li>
        </ul>
      </div>
    </span>
  </td>

  <td data-col="days_due" class="text-center font-monospace" style="font-size:.83rem">
    {{ row.days_due }}
  </td>

  <td data-col="description" class="small text-muted">
    {{ row.description|default:"—" }}
  </td>

</tr>
