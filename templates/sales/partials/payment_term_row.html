{% load i18n %}
<tr>

  <td data-col="name" class="fw-semibold" style="font-size:.85rem;color:#1e2130">
    {{ row.name }}
    <span class="dt-hover-actions">
      <button type="button" class="btn btn-link btn-sm p-0 text-secondary" title="{% trans 'Editar' %}" style="font-size:0.85rem"
              hx-get="{% url 'sales:payment_term_edit' row.pk %}"
              hx-target="#payment-term-modal-body"
              hx-on::after-request="
                document.getElementById('paymentTermModalLabel').textContent = '{% trans "Editar término de pago" %}';
                bootstrap.Modal.getOrCreateInstance('#paymentTermModal').show();">
        <i class="bi bi-pencil"></i>
      </button>
      <button type="button" class="btn btn-link btn-sm p-0 text-danger" title="{% trans 'Eliminar' %}" style="font-size:0.85rem"
              onclick="Swal.fire({
                icon: 'warning',
                title: '{% trans "¿Eliminar término?" %}',
                html: '<strong>{{ row.name|escapejs }}</strong>',
                showCancelButton: true,
                confirmButtonText: '{% trans "Eliminar" %}',
                cancelButtonText: '{% trans "Cancelar" %}',
                confirmButtonColor: '#dc3545',
              }).then(r => {
                if (r.isConfirmed)
                  htmx.ajax('POST', '{% url "sales:payment_term_delete" row.pk %}',
                    { target: '#dt-results', swap: 'innerHTML',
                      values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
              })">
        <i class="bi bi-trash"></i>
      </button>
    </span>
  </td>

  <td data-col="days_due" class="text-center font-monospace" style="font-size:.83rem">
    {{ row.days_due }}
  </td>

  <td data-col="description" class="small text-muted">
    {{ row.description|default:"—" }}
  </td>


</tr>
