{% comment %}
  Optional call-to-action button. Renders only when `document_url` is in context,
  so it is non-breaking until the view provides the link.
  Param: label — translated button text (e.g. "Ver factura")
{% endcomment %}
{% if document_url %}
<tr>
  <td style="padding: 20px 28px 0;" align="center">
    <table role="presentation" cellpadding="0" cellspacing="0">
      <tr>
        <td bgcolor="#1e2130" style="border-radius:6px;">
          <a href="{{ document_url }}" style="display:inline-block;padding:11px 28px;font-size:13px;font-weight:700;color:#ffffff;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;">{{ label }}</a>
        </td>
      </tr>
    </table>
  </td>
</tr>
{% endif %}
