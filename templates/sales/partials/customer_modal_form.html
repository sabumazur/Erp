{% load crispy_forms_tags i18n %}
<form hx-post="{{ action_url }}"
      hx-target="{% if hx_target == 'refresh' %}body{% else %}{{ hx_target|default:'#customer-table' }}{% endif %}"
      hx-swap="{% if hx_target == 'refresh' %}none{% else %}innerHTML{% endif %}"
      hx-on::after-request="if(event.detail.successful && event.target === this) bootstrap.Modal.getInstance('#customerModal').hide()"
      class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <input type="hidden" name="_hx_target" value="{{ hx_target|default:'#customer-table' }}">
  <div class="modal-body">
    {% crispy form %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancelar" %}</button>
    <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
  </div>
</form>
