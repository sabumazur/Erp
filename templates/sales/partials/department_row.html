{% load i18n %}
<tr data-pk="{{ row.pk }}"
    data-status="{% if row.is_active %}active{% else %}inactive{% endif %}"
    data-detail-url="">
  <td data-col="name" class="fw-semibold">
    <button type="button"
            class="btn btn-link p-0 fw-semibold text-decoration-none link-brand"
            style="font-size:.85rem"
            hx-get="{% url 'sales:department_edit' customer.pk row.pk %}"
            hx-target="#dept-modal-body"
            onclick="event.stopPropagation()"
            hx-on::after-request="document.getElementById('deptModalTitle').textContent='{% trans "Editar departamento" %}';
                                  bootstrap.Modal.getOrCreateInstance(document.getElementById('deptModal')).show();">
      {{ row.name }}
    </button>
    <span class="dt-row-actions">
      <div class="dropdown dt-kebab">
        <button type="button"
                class="btn btn-link btn-sm p-0 dt-kebab-btn"
                aria-label="{% trans 'Acciones' %}"
                data-bs-toggle="dropdown"
                data-bs-boundary="viewport"
                aria-expanded="false"
                tabindex="-1">
          <i class="bi bi-three-dots-vertical"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li>
            <button type="button" class="dropdown-item" data-action="edit"
                    hx-get="{% url 'sales:department_edit' customer.pk row.pk %}"
                    hx-target="#dept-modal-body"
                    hx-on::after-request="document.getElementById('deptModalTitle').textContent='{% trans "Editar departamento" %}';
                                          bootstrap.Modal.getOrCreateInstance(document.getElementById('deptModal')).show();">
              <i class="bi bi-pencil me-2"></i>{% trans "Editar" %}
            </button>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <button type="button" class="dropdown-item text-danger" data-action="delete"
                    onclick="Swal.fire({
                      icon: 'warning',
                      title: '{% trans "¿Eliminar departamento?" %}',
                      html: '<strong>{{ row.name|escapejs }}</strong>',
                      showCancelButton: true,
                      confirmButtonText: '{% trans "Eliminar" %}',
                      cancelButtonText: '{% trans "Cancelar" %}',
                      confirmButtonColor: '#dc3545',
                    }).then(r => {
                      if (r.isConfirmed)
                        htmx.ajax('POST', '{% url "sales:department_delete" customer.pk row.pk %}',
                          { target: '#dt-results', swap: 'innerHTML',
                            values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
                    })">
              <i class="bi bi-trash me-2"></i>{% trans "Eliminar" %}
            </button>
          </li>
        </ul>
      </div>
    </span>
  </td>
  <td data-col="contact_name">{{ row.contact_name|default:"—" }}</td>
  <td data-col="phone" class="small">{{ row.phone|default:"—" }}</td>
  <td data-col="address" class="small text-muted">{{ row.address|default:"—" }}</td>
  <td data-col="is_active">
    <span class="badge-soft {% if row.is_active %}badge-active{% else %}badge-inactive{% endif %}">
      {% if row.is_active %}{% trans "Activo" %}{% else %}{% trans "Inactivo" %}{% endif %}
    </span>
  </td>
</tr>
