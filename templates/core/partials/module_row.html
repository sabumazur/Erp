{% load i18n %}
<tr class="{% if not row.is_active %}text-muted{% endif %}"
    data-pk="{{ row.pk }}"
    data-status=""
    data-detail-url="{% url 'core:module_detail' row.pk %}">

  <td data-col="slug" class="font-monospace" style="font-size:.8rem">{{ row.slug }}</td>

  <td data-col="name">
    <span class="cust"><a href="{% url 'core:module_detail' row.pk %}">{{ row.name }}</a></span>
    <span class="dt-row-actions">
      <div class="dropdown dt-kebab">
        <button type="button"
                class="btn btn-link btn-sm p-0 dt-kebab-btn"
                aria-label="{% trans 'Acciones' %}"
                data-bs-toggle="dropdown"
                data-bs-boundary="viewport"
                aria-expanded="false"
                tabindex="-1">
          <i class="bi bi-three-dots-vertical"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li>
            <a class="dropdown-item" href="{% url 'core:module_detail' row.pk %}" data-action="view">
              <i class="bi bi-eye me-2"></i>{% trans "Ver" %}
            </a>
          </li>
          <li>
            <button type="button" class="dropdown-item" data-action="edit"
                    hx-get="{% url 'core:module_edit' row.pk %}"
                    hx-target="#module-modal-body"
                    hx-on::after-request="
                      document.getElementById('moduleModalLabel').textContent = '{% trans "Editar módulo" %}';
                      bootstrap.Modal.getOrCreateInstance('#moduleModal').show();">
              <i class="bi bi-pencil me-2"></i>{% trans "Editar" %}
            </button>
          </li>
          <li>
            <button type="button"
                    class="dropdown-item {% if row.is_active %}text-warning{% else %}text-success{% endif %}"
                    onclick="Swal.fire({
                      icon: 'question',
                      title: '{% if row.is_active %}{% trans "¿Desactivar módulo?" %}{% else %}{% trans "¿Activar módulo?" %}{% endif %}',
                      html: '<strong>{{ row.name|escapejs }}</strong>',
                      showCancelButton: true,
                      confirmButtonText: '{% trans "Confirmar" %}',
                      cancelButtonText: '{% trans "Cancelar" %}',
                    }).then(r => {
                      if (r.isConfirmed)
                        htmx.ajax('POST', '{% url "core:module_toggle" row.pk %}',
                          { target: '#dt-results', swap: 'innerHTML',
                            values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
                    })">
              <i class="bi bi-toggle-{% if row.is_active %}on{% else %}off{% endif %} me-2"></i>
              {% if row.is_active %}{% trans "Desactivar" %}{% else %}{% trans "Activar" %}{% endif %}
            </button>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <button type="button" class="dropdown-item text-danger" data-action="delete"
                    onclick="Swal.fire({
                      icon: 'warning',
                      title: '{% trans "¿Eliminar módulo?" %}',
                      html: '<strong>{{ row.name|escapejs }}</strong>',
                      showCancelButton: true,
                      confirmButtonText: '{% trans "Eliminar" %}',
                      cancelButtonText: '{% trans "Cancelar" %}',
                      confirmButtonColor: '#dc3545',
                    }).then(r => {
                      if (r.isConfirmed)
                        htmx.ajax('POST', '{% url "core:module_delete" row.pk %}',
                          { target: '#dt-results', swap: 'innerHTML',
                            values: { csrfmiddlewaretoken: '{{ csrf_token }}' } });
                    })">
              <i class="bi bi-trash me-2"></i>{% trans "Eliminar" %}
            </button>
          </li>
        </ul>
      </div>
    </span>
  </td>

  <td data-col="icon">
    <i class="bi {{ row.icon|default:'bi-grid' }} me-1"></i>
    <span class="font-monospace small text-muted">{{ row.icon|default:"—" }}</span>
  </td>

  <td data-col="is_active">
    {% if row.is_active %}
      <span class="badge-soft badge-paid">{% trans "Activo" %}</span>
    {% else %}
      <span class="badge-soft badge-default">{% trans "Inactivo" %}</span>
    {% endif %}
  </td>

</tr>
